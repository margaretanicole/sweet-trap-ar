<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sweet Trap</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>

</head>

<body>

<div id="startScreen">

    <h1>Sweet Trap</h1>

    <button id="startButton">
        MULAI
    </button>

</div>

<a-scene style="display:none;">

    <!-- Semua asset dimasukkan di sini -->
    <a-assets>

    <video
        id="videoDiabetes"
        src="videos/video-edukasi-diabetes.mp4"
        playsinline
        webkit-playsinline
        loop
        crossorigin="anonymous">
    </video>

    </a-assets>

    <!-- Background -->
    <a-sky color="#ECECEC"></a-sky>

    <!-- VIDEO -->
    <a-video
        src="#videoDiabetes"
        position="-4 1 0"
        rotation="0 90 0"
        width="2"
        height="3">
    </a-video>

    <!-- DEPAN -->
    <a-image
        src="images/caution.png"
        position="0 1.7 -4"
        width="2.8"
        height="1.8">
    </a-image>

    <a-image
        src="images/360 content.png"
        position="0.1 0.5 -3.5"
        width="2.5"
        height="1.8">
    </a-image>

    <a-image
        src="images/trap cake.png"
        position="0 4.1 -4"
        width="3.5"
        height="3">
    </a-image>

    <a-image
        src="images/sign danger.png"
        position="3 2 -4"
         rotation="0 -25 0"
        width="1.5"
        height="1.7">
    </a-image>

    <a-image
        src="images/sign stop.png"
        position="-3 2 -4"
         rotation="0 25 0"
        width="1.4"
        height="1.5">
    </a-image>


    <!-- KANAN -->
    <a-image
        src="images/berapa banyak sih.png"
        position="4.5 4 1.1"
        rotation="0 -90 0"
        width="6"
        height="1">
    </a-image>

    <a-image
        src="images/choco cake new.png"
        position="4.5 2.5 -2.7"
        rotation="0 -90 0"
        width="1.5"
        height="1.5">
    </a-image>

    <a-image
        src="images/Choco text.png"
        position="4.5 2.5 -1.2"
        rotation="0 -90 0"
        width="1.2"
        height="1">
    </a-image>

    <a-image
        src="images/coca cola new.png"
        position="4.5 2.5 0"
        rotation="0 -90 0"
        width="1"
        height="1.5">
    </a-image>

    <a-image
        src="images/soda.png"
        position="4.5 2.5 1.1"
        rotation="0 -90 0"
        width="1.3"
        height="1">
    </a-image>

    <a-image
        src="images/cookies new.png"
        position="4.5 2.5 2.5"
        rotation="0 -90 0"
        width="1.5"
        height="1.5">
    </a-image>

    <a-image
        src="images/soft cookies.png"
        position="4.5 2.5 4"
        rotation="0 -90 0"
        width="2"
        height="1.5">
    </a-image>

    <a-image
        src="images/dubai chewy new.png"
        position="4.5 0.8 2.7"
        rotation="0 -90 0"
        width="1.5"
        height="1.1">
    </a-image>

    <a-image
        src="images/dubai text.png"
        position="4.5 0.8 4.1"
        rotation="0 -90 0"
        width="1.2"
        height="1">
    </a-image>

    <a-image
        src="images/eskrim new.png"
        position="4.5 0.8 0"
        rotation="0 -90 0"
        width="1.5"
        height="1.3">
    </a-image>

    <a-image
        src="images/ice cream.png"
        position="4.5 0.8 1.3"
        rotation="0 -90 0"
        width="1.5"
        height="1.5">
    </a-image>

    <a-image
        src="images/matcha cih fix.png"
        position="4.5 0.8 -2.7"
        rotation="0 -90 0"
        width="1.2"
        height="1.5">
    </a-image>

    <a-image
        src="images/matcha.png"
        position="4.5 0.8 -1.5"
        rotation="0 -90 0"
        width="1.5"
        height="1.5">
    </a-image>

    <!-- KIRI -->
    <a-image
        src="images/data dan survei.png"
        position="-4.5 4 0"
        rotation="0 90 0"
        width="7"
        height="1.3">
    </a-image>

    <a-image
        src="images/data dan survei.png"
        position="0 2 -3"
        rotation="0 0 0"
        width="3"
        height="2">
    </a-image>

    <a-image
        src="images/berita 2.jpeg"
        position="-4.2 1 -2.5"
        rotation="0 90 0"
        width="2"
        height="3">
    </a-image>

         <a-image
        src="images/berita 3.jpeg"
        position="-4.2 1 2.5"
        rotation="0 90 0"
        width="2"
        height="3">
    </a-image>

    <!-- BELAKANG -->
    <a-image
        src="images/who.png"
        position="0 3.3 3.7"
        rotation="0 180 0"
        width="6"
        height="1.5">
    </a-image>

    <a-image
        src="images/who source.png"
        position="0 2.2 3.7"
        rotation="0 180 0"
        width="4.5"
        height="0.5">
    </a-image>

    <a-image
        src="images/logo sweet trap.png"
        position="0 1.3 3.7"
        rotation="0 180 0"
        width="1.5"
        height="1.5">
    </a-image>

    <!-- Lantai -->
    <a-plane
        rotation="-90 0 0"
        width="20"
        height="20"
        color="#F5F5F5">
    </a-plane>

    <!-- Cahaya -->
    <a-light
        type="ambient"
        intensity="1">
    </a-light>

    <a-light
        type="directional"
        intensity="0.7"
        position="1 3 2">
    </a-light>

    <a-entity
    camera
    look-controls="magicWindowTrackingEnabled:true"
    position="0 1.6 0">
    </a-entity>

</a-scene>

<script src="js/script.js"></script>
<script src="js/gyro.js"></script>

</body>

</html>
